# LLM model parameters
llms:
  api:
    model: "gpt-5.4-nano"
    base_url: "https://llm.inzhenerka-cloud.com/"
    timeout: 60
    max_output_tokens: 1024
  ollama:
    model: "qwen2.5:0.5b"
    provider: "ollama"
    base_url: "http://localhost:11434/"
    timeout: 60
    max_output_tokens: 1024

# RAG system parameters
rag:
  embeddings:
    model: "text-embedding-3-small"
    base_url: "https://llm.inzhenerka-cloud.com/"

# Various app-wide settings
app:
  log_level: "INFO"
